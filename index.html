<!DOCTYPE html>
<html lang="sw">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#111827" />
    <title>Kuku Cross — Mission Barabara</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0f1225;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        overflow: hidden;
        font-family: monospace;
        touch-action: none;
      }

      #game-container {
        position: relative;
        width: 100%;
        max-width: 896px;
      }

      #game-container canvas {
        display: block;
        width: 100% !important;
        height: auto !important;
      }

      /* Loading splash */
      #loading {
        position: absolute;
        inset: 0;
        background: #0f1225;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fbbf24;
        gap: 12px;
        z-index: 10;
      }

      #loading h1 { font-size: 1.6rem; letter-spacing: 2px; }
      #loading p  { font-size: 0.9rem; color: #9ca3af; }

      #loading.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="loading">
        <h1>🐔 KUKU CROSS</h1>
        <p>Mission Barabara — inapakia…</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
      // Hide loading splash once Phaser canvas appears
      const observer = new MutationObserver(() => {
        const canvas = document.querySelector('#game-container canvas');
        if (canvas) {
          document.getElementById('loading')?.classList.add('hidden');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('game-container'), { childList: true });
    </script>
  </body>
</html>
